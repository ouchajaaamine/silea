spring:
  application:
    name: barakahStore
  datasource:
    url: jdbc:mysql://localhost:3306/barakahdb
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        '[format_sql]': true
    defer-datasource-initialization: true
  jackson:
    serialization:
      fail-on-empty-beans: false
  sql:
    init:
      mode: never

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
    root: INFO