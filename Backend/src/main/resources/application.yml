spring:
  application:
    name: silea
  datasource:
    # Fixed JDBC URL: include query parameters with ? and proper param name
    # Using utf8mb4 for full UTF-8 support including emojis and all Unicode characters
    url: 'jdbc:mysql://localhost:3306/sileadb?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci'
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Use create-drop to force database recreation and re-seed data
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        '[format_sql]': true
    defer-datasource-initialization: true
  jackson:
    serialization:
      fail-on-empty-beans: false
    default-property-inclusion: non_null
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: always

# File upload configuration
file:
  upload-dir: uploads/images

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
    root: INFO